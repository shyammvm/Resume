name: Build and Deploy Resume

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update years of experience
        run: python .github/scripts/update_experience.py

      - name: Commit updated experience
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update years of experience [skip ci]"
          file_pattern: "resume/**/*.tex"

      - name: Set up LaTeX & build PDFs
        uses: xu-cheng/latex-action@v2
        with:
          root_file: |
            resume/sde/resume.tex
            resume/ds/resume.tex
            resume/de/resume.tex
          work_in_root_file_dir: true

      - name: Create public directory and move files
        run: |
          mkdir -p public
          # 1. Copy the "Red Bull" themed gate to the root
          cp index.html public/index.html
          
          # 2. Move and rename the specialized PDFs to match your HTML links
          # This keeps the "Data Engineer Edition" etc. working in the gate
          mv resume/de/resume.pdf public/resume_de.pdf
          mv resume/ds/resume.pdf public/resume_ds.pdf
          mv resume/sde/resume.pdf public/resume_sde.pdf

          # 3. Optional: Legacy support (keeps old direct links alive)
          # Use 'cp' instead of 'mv' if you have old links floating around
          cp public/resume_de.pdf public/de.pdf
          cp public/resume_ds.pdf public/ds.pdf
          cp public/resume_sde.pdf public/sde.pdf

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
